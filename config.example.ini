# Config for mt_pipeline.py
# Edit only this file when paths or switches change.

[paths]
# Input species FASTAs used for pairwise alignment. File basename is treated as sample/species key.
primate_dir = /home/lt692/project_pi_njl27/lt692/Rotate/out_global_rotate/rotated_fastas_tool
fai_dir = {primate_dir}

# Main output directory.
outdir = /home/lt692/project_pi_njl27/lt692/Rotate/Liftover_pipeline_results/output_modular

# Human FASTA for alignment should be rotated; human FASTA for final REF check should be unrotated chrM.
align_human_fasta = /home/lt692/project_pi_njl27/lt692/Rotate/Homo_blast_db/Homo_sapiens_rotated.fa
ref_human_fasta = /home/lt692/project_pi_njl27/lt692/Rotate/Homo_blast_db/Homo_sapiens.fa

# Metadata files used by the existing pipeline.
sample_ref_file = sample_ref_list_pure.txt
rotate_pos_file = rotate_primate_pos.txt
sample_list_file = 

# Optional explicit FASTA templates. If sample_fasta_template does not exist, the code falls back to {primate_dir}/{sample}.fa or .fasta.
sample_fasta_template = {primate_dir}/{sample}.fa

# Input VCF/COV directories. VCFs are found by accession prefix from sample_ref_file: {accession}*.vcf or {accession}*.vcf.gz.
vcf_input_dir = /home/lt692/scratch_pi_njl27/lt692/QC_VCF
cov_input_dir = /home/lt692/scratch_pi_njl27/lt692/QC_cov

# Output subdirectories.
tmp_dir = {outdir}/tmp
reports_dir = {outdir}/reports
maps_dir = {outdir}/maps
alignments_dir = {outdir}/alignments
vcf_lifted_raw_dir = {outdir}/vcf_lifted_raw
vcf_codon_dir = {outdir}/vcf_annotated_codon
vcf_trna_dir = {outdir}/vcf_annotated_trna
vcf_final_dir = {outdir}/vcf_final
cov_lifted_dir = {outdir}/cov_lifted
trna_index_dir = {outdir}/trna_index
debug_dir = {outdir}/debug

# Codon lookup tables.
all_primate_position_codon_table = all_species_position_to_codon.tsv
human_codon_table = human_chrM_position_to_codon.tsv

# tRNAscan-SE files and indexes.
# Important: species tRNAscan coordinates must match original VCF coordinates; human coordinates must match final human REF coordinates.
trnascan_dir = {outdir}/trnascan
human_trna_fasta = {ref_human_fasta}
human_trnascan_prefix = {trnascan_dir}/human
human_trnascan_out = {trnascan_dir}/human.trnascan.out
human_trnascan_ss = {trnascan_dir}/human.trnascan.ss
human_trna_index = {trna_index_dir}/human.trna_position_index.tsv.gz
species_trna_fasta_template = {primate_dir}/{sample}.fa
species_trnascan_prefix_template = {trnascan_dir}/{sample}
species_trnascan_out_template = {trnascan_dir}/{sample}.trnascan.out
species_trnascan_ss_template = {trnascan_dir}/{sample}.trnascan.ss
species_trna_index_template = {trna_index_dir}/{sample}.trna_position_index.tsv.gz

[settings]
# Coordinate conventions.
human_len = 16569
human_restore_offset = 1325
target_chrom = chrM

# Alignment. aligner can be mafft, muscle, prank, or none.
aligner = mafft
aligner_args = 
run_align = 1
run_posmap = 1
max_jump = 3
neighbor_window = 5

# Main stages. Liftover is raw/liftover-only. Codon/tRNA are annotation-only.
run_vcf_liftover = 1
run_cov_liftover = 0
run_codon_annotate = 1
run_trna_annotate = 1
run_trna_gene_qc = 0
run_final_filter = 0
# final_filter_mode options:
# none, codon_pass, trna_region_match, trna_pair_state_match, trna_pair_pos_match,
# codon_or_trna, trna_loose_match, trna_strict_match, region_policy
final_filter_mode = none

# Codon matching.
# strict_phase_match=1 means codon PASS requires same gene AND same codon_pos_in_triplet (1/2/3) between source variant and lifted human site.
strict_phase_match = 1

# tRNA matching.
# Use none, strip_chr, or add_chr if VCF and tRNAscan contig names differ.
species_trna_chrom_norm = none
human_trna_chrom_norm = none
species_vcf_chrom_norm = none
human_vcf_chrom_norm = none
species_trna_coord_space = original
species_trna_lookup_ignore_chrom = 0
human_trna_lookup_ignore_chrom = 0
run_trnascan_if_missing = 0
trnascan_bin = tRNAscan-SE
trnascan_mode = mito_mammal
trnascan_threads = 4
trnascan_extra_args = 

# Temporary files.
keep_tmp = 1
